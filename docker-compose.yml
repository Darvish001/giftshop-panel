services:
  giftshop-panel:
    image: ${DOCKER_IMAGE:-darvish021/giftshop-panel:latest}
    container_name: giftshop-panel
    restart: always
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    env_file:
      - ./.env
    ports:
      # PUBLISH_PORT is the host-side port. PORT is the app/container port.
      # In SSL mode the installer sets BIND_HOST=127.0.0.1 and Nginx handles 80/443.
      - "${BIND_HOST:-127.0.0.1}:${PUBLISH_PORT:-8000}:${PORT:-8000}"
